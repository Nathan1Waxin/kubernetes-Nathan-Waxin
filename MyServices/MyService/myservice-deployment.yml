apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-end
  template:
    metadata:
      labels:
        app: front-end
    spec:
      containers:
        - name: front-end-container
          image: efrei/front-end:1
          imagePullPolicy: Always
          env:
            - name: backEndURL
              value: "http://back-end/hello"

